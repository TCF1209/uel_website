<!DOCTYPE html>
<html lang="en-MY">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta http-equiv="refresh" content="0; url=api-cert.html">
<title>UEL API & Cert</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;800;900&family=Sora:wght@400;500;600;700&display=swap');
  :root{--void:#07070a;--carbon:#111116;--bone:#f5f3ec;--paper:#d9d6ce;--line:rgba(255,255,255,.14);--amber:#f6b441;--display:"Saira Condensed",sans-serif;--body:"Sora",sans-serif}
  *{box-sizing:border-box}
  html,body{min-height:100%;margin:0;background:radial-gradient(circle at 50% 20%,rgba(246,180,65,.15),transparent 34%),var(--void);color:var(--bone);font-family:var(--body)}
  main{min-height:100vh;display:grid;place-items:center;padding:28px}
  section{width:min(560px,100%);border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02)),var(--carbon);padding:clamp(24px,5vw,42px);text-align:center;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  img{width:min(220px,80%);margin:0 auto 24px;border-radius:14px}
  h1{margin:0;font-family:var(--display);font-size:clamp(34px,8vw,62px);line-height:1;text-transform:uppercase}
  h1 em{font-style:normal;color:var(--amber)}
  p{color:var(--paper);line-height:1.65}
  a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;margin-top:14px;padding:12px 20px;border-radius:999px;background:var(--bone);color:var(--void);font-family:var(--display);font-weight:900;text-decoration:none;text-transform:uppercase}
</style>
<script>
  window.location.replace('api-cert.html');
</script>
</head>
<body>
<main>
  <section>
    <img loading="lazy" src="images/uel-logo.webp" alt="UEL Unique Excellent Lubricant">
    <h1>Moved to <em>API & Cert.</em></h1>
    <p>The old Technology page is now combined with API proof, certificate documents, and simple oil selection guidance.</p>
    <a href="api-cert.html">Open API & Cert</a>
  </section>
</main>
</body>
</html>
